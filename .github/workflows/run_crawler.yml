name: Daily ETF Crawler

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: 

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 1. 複製專案程式碼
      uses: actions/checkout@v4

    - name: 2. 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安裝爬蟲必要套件
      run: |
        pip install requests pandas openpyxl

    - name: 4. 執行 Python 爬蟲
      run: python crawler.py

    - name: 5. 自動將所有新檔案推回 GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # 【關鍵修正】強制讓 Git 自動打包所有產生出來的 json 與 excel 檔案
        git add --all
        git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新：每日最新 ETF 資料" && git push)
